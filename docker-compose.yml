version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: hotelmind_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hotelmind}
      POSTGRES_USER: ${POSTGRES_USER:-hotelmind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hotelmind_secret}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hotelmind} -d ${POSTGRES_DB:-hotelmind}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hotelmind_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hotelmind}:${POSTGRES_PASSWORD:-hotelmind_secret}@db:5432/${POSTGRES_DB:-hotelmind}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.65}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
    driver: local
