# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# sys.path path, relative to this file, to place in sys.path.
# This makes importing 'app' possible without pre-installing the project.
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# timezone =

# max length of characters to associate with the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow systems to find SQL files in
# a space-separated list of directories
# version_locations = %(here)s/bar:%(here)s/bat:alembic/versions

# version_path_separator = :

# logging configuration (relative to alembic.ini)
# config_file_name = logging.ini

# sqlalchemy.url is dynamically set in env.py from settings,
# so we don't need to specify it statically here.
sqlalchemy.url = postgresql+asyncpg://hotelmind:hotelmind_secret@localhost:5432/hotelmind

[post_write_hooks]
# post_write_hooks defines scripts or behavior that is run
# after a new migration script is generated.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
